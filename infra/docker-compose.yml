services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myai-pg
    environment:
      POSTGRES_DB: myai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myai -d myai"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
