openapi: 3.0.3
info:
  title: My-AI API
  version: 0.1.0
  description: |
    V1 最小接口契约（单用户、单知识库基线）
servers:
  - url: http://localhost:8080

tags:
  - name: ingest
  - name: knowledge
  - name: qa

paths:
  /api/v1/documents/upload:
    post:
      tags: [ingest]
      summary: 上传文档并触发入库
      x-stage: implemented
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                kbId:
                  type: string
                  description: 知识库 ID（V1 可选，默认 default）
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'

  /api/v1/documents/{documentId}/status:
    get:
      tags: [ingest]
      summary: 查询文档处理状态
      x-stage: implemented
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: 文档资产 ID（同一 kbId + fileHash 下保持稳定）
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentStatusResponse'
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/chunks/preview:
    get:
      tags: [ingest]
      summary: 查询文档分块预览（调试）
      x-stage: implemented
      description: |
        用于验证“向量化前分块内容”是否符合预期。
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: 文档资产 ID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
          description: 最大返回分块数
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
            maximum: 100000
          description: 分页偏移量
        - name: previewChars
          in: query
          required: false
          schema:
            type: integer
            default: 200
            minimum: 20
            maximum: 2000
          description: 单个分块预览字符数
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChunksPreviewResponse'
        '400':
          description: 参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/reprocess:
    post:
      tags: [ingest]
      summary: 手动触发文档重处理
      x-stage: implemented
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: 文档资产 ID（重处理不会改变该 ID）
      responses:
        '200':
          description: 重处理已受理
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentStatusResponse'
        '400':
          description: 参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 当前状态不允许重处理
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}:
    delete:
      tags: [ingest]
      summary: 删除文档资产
      x-stage: implemented
      description: |
        软删除文档资产，清理源文件与该 documentId 的全部向量版本。
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功（或已删除，幂等成功）
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 文档状态冲突（INGESTING/DELETING）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 删除执行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/knowledge-bases:
    get:
      tags: [knowledge]
      summary: 查询知识库列表（草案）
      description: |
        该接口当前仅保留契约草案，代码尚未实现。
      x-stage: draft
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeBase'

  /api/v1/qa/ask:
    post:
      tags: [qa]
      summary: 文档问答（草案）
      description: |
        该接口当前仅保留契约草案，代码尚未实现。
      x-stage: draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: 问答成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'

components:
  schemas:
    UploadResponse:
      type: object
      properties:
        documentId:
          type: string
          description: 文档资产 ID（同一 kbId + fileHash 下保持稳定）
        status:
          type: string
          example: ACCEPTED

    DocumentStatusResponse:
      type: object
      properties:
        documentId:
          type: string
          description: 文档资产 ID
        status:
          type: string
          example: UPLOADED

    DocumentChunksPreviewResponse:
      type: object
      properties:
        documentId:
          type: string
        chunkCount:
          type: integer
        totalChunks:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        previewChars:
          type: integer
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/DocumentChunkPreviewItem'

    DocumentChunkPreviewItem:
      type: object
      properties:
        chunkIndex:
          type: integer
        contentLength:
          type: integer
        contentPreview:
          type: string
        truncated:
          type: boolean
        sourceFile:
          type: string
        contentHash:
          type: string
        splitVersion:
          type: string
        sourceHint:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    KnowledgeBase:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    AskRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        kbId:
          type: string
          default: default
        topK:
          type: integer
          default: 5

    AskResponse:
      type: object
      properties:
        answer:
          type: string
        references:
          type: array
          items:
            type: string
