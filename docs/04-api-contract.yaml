openapi: 3.0.3
info:
  title: My-AI API
  version: 0.1.0
  description: |
    V1 最小接口契约（单用户、单知识库基线）
servers:
  - url: http://localhost:8080

tags:
  - name: ingest
  - name: knowledge
  - name: qa

paths:
  /api/v1/documents/upload:
    post:
      tags: [ingest]
      summary: 上传文档并触发入库
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                kbId:
                  type: string
                  description: 知识库 ID（V1 可选，默认 default）
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'

  /api/v1/documents/{documentId}/status:
    get:
      tags: [ingest]
      summary: 查询文档处理状态
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: 文档资产 ID（同一 kbId + fileHash 下保持稳定）
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentStatusResponse'
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/knowledge-bases:
    get:
      tags: [knowledge]
      summary: 查询知识库列表
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeBase'

  /api/v1/qa/ask:
    post:
      tags: [qa]
      summary: 文档问答
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: 问答成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'

  /api/v1/documents/{documentId}/reprocess:
    post:
      tags: [ingest]
      summary: 手动触发文档重处理（草案）
      description: |
        该接口用于处理执行阶段的重试与重建流程。
        当前为设计草案，待方案评审通过后进入实现。
      x-stage: draft
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: 文档资产 ID（重处理不会改变该 ID）
      responses:
        '202':
          description: 已受理重处理请求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '404':
          description: 文档不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UploadResponse:
      type: object
      properties:
        documentId:
          type: string
          description: 文档资产 ID（同一 kbId + fileHash 下保持稳定）
        status:
          type: string
          example: ACCEPTED

    DocumentStatusResponse:
      type: object
      properties:
        documentId:
          type: string
          description: 文档资产 ID
        status:
          type: string
          example: UPLOADED

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    KnowledgeBase:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    AskRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        kbId:
          type: string
          default: default
        topK:
          type: integer
          default: 5

    AskResponse:
      type: object
      properties:
        answer:
          type: string
        references:
          type: array
          items:
            type: string
